version: 2.1

orbs:
  docker: circleci/docker@3.0.1
  browser-tools: circleci/browser-tools@1.5.2

parameters:
  GHA_Action:
    type: string
    default: ""
  GHA_Actor:
    type: string
    default: ""
  GHA_Event:
    type: string
    default: ""
  GHA_Meta:
    type: string
    default: ""
  CI_UTILS_IMAGE_TAG:
    type: string
    default: "v4.3.0"
  CONFIG_REPO_NAME:
    type: string
    default: "myaccount-config"
  CONFIG_REPO_URL:
    type: string
    default: "git@github.com:psu-libraries/myaccount-config.git"
  REGISTRY_HOST:
    type: string
    default: "harbor.k8s.libraries.psu.edu"
  CLUSTERS_DEV:
    type: string
    default: "uldev"
  CLUSTERS_PROD:
    type: string
    default: "prod"

commands:
  clone-config-repo:
    steps:
      - add_ssh_keys
      - run:
          name: Prepare GitHub Access
          command: |
            ssh-keyscan github.com > ~/.ssh/known_hosts
            git clone $CONFIG_REPO_URL

  compute-docker-tag:
    steps:
      - run:
          name: Compute Docker Tag
          command: |
            if [[ "$CIRCLE_BRANCH" == "main" ]]; then
              TAG="$CIRCLE_SHA1"
            else
              SLUG=$(slugify-branch "$CIRCLE_BRANCH")
              TAG="${SLUG}--$CIRCLE_SHA1"
            fi
            echo "export TAG=$TAG" >> "$BASH_ENV"

executors:
  ci-utils:
    parameters:
      image_tag:
        type: string
      registry_host:
        type: string
    docker:
      - image: << parameters.registry_host >>/library/ci-utils:<< parameters.image_tag >>

jobs:
  build-image:
    environment:
      REGISTRY_HOST: << pipeline.parameters.REGISTRY_HOST >>
      REGISTRY_REPO: "library/$CIRCLE_PROJECT_REPONAME"
    executor:
      name: ci-utils
      image_tag: << pipeline.parameters.CI_UTILS_IMAGE_TAG >>
      registry_host: << pipeline.parameters.REGISTRY_HOST >>
    steps:
      - setup_remote_docker:
          docker_layer_caching: true
      - checkout
      - compute-docker-tag
      - docker/check:
          registry: $REGISTRY_HOST
      - docker/build:
          image: $REGISTRY_REPO
          registry: $REGISTRY_HOST
          tag: $TAG
          extra_build_args: "--target production"
          # Use buildx cache to speed up repeated CI builds
          cache_from: "type=registry,ref=$REGISTRY_HOST/library/$CIRCLE_PROJECT_REPONAME:cache"
          cache_to: "type=registry,ref=$REGISTRY_HOST/library/$CIRCLE_PROJECT_REPONAME:cache,mode=max"
      - run:
          name: Save Docker image
          command: |
            docker save $REGISTRY_HOST/library/$CIRCLE_PROJECT_REPONAME:$TAG -o /tmp/docker-image.tar
      - persist_to_workspace:
          root: /tmp
          paths:
            - docker-image.tar

  push-image:
    environment:
      REGISTRY_HOST: << pipeline.parameters.REGISTRY_HOST >>
      REGISTRY_REPO: "library/$CIRCLE_PROJECT_REPONAME"
    executor:
      name: ci-utils
      image_tag: << pipeline.parameters.CI_UTILS_IMAGE_TAG >>
      registry_host: << pipeline.parameters.REGISTRY_HOST >>
    steps:
      - setup_remote_docker:
          docker_layer_caching: false
      - checkout
      - compute-docker-tag
      - attach_workspace:
          at: /tmp
      - run:
          name: Load Docker image
          command: |
            docker load -i /tmp/docker-image.tar
      - docker/check:
          registry: $REGISTRY_HOST
      - docker/push:
          image: $REGISTRY_REPO
          registry: $REGISTRY_HOST
          tag: "$TAG"

  delete-deployment:
    parameters:
      delete_branch:
        type: string
    executor:
      name: ci-utils
      image_tag: << pipeline.parameters.CI_UTILS_IMAGE_TAG >>
      registry_host: << pipeline.parameters.REGISTRY_HOST >>
    environment:
      CONFIG_REPO_NAME: << pipeline.parameters.CONFIG_REPO_NAME >>
      CONFIG_REPO_URL: << pipeline.parameters.CONFIG_REPO_URL >>
      DELETE_BRANCH: << parameters.delete_branch >>
    steps:
      - clone-config-repo
      - run:
          name: Delete Deployment
          command: |
            export TRIGGERED_BY="$CIRCLE_USERNAME"
            cd $CONFIG_REPO_NAME
            ./bin/ci-delete-manifest

  deploy-application:
    executor:
      name: ci-utils
      image_tag: << pipeline.parameters.CI_UTILS_IMAGE_TAG >>
      registry_host: << pipeline.parameters.REGISTRY_HOST >>
    environment:
      clusters: << parameters.clusters >>
      CONFIG_REPO_NAME: << pipeline.parameters.CONFIG_REPO_NAME >>
      CONFIG_REPO_URL: << pipeline.parameters.CONFIG_REPO_URL >>
    parameters:
      clusters:
        type: string
    steps:
      - clone-config-repo
      - compute-docker-tag
      - run:
          name: Add or Update Application Manifest
          command: |
            export TRIGGERED_BY="$CIRCLE_USERNAME"
            # Split comma-separated clusters into array and loop
            clusters="${clusters// /}"
            IFS=',' read -ra CLUSTERS \<<< "$clusters"
            echo "Pre loop Directory: $(pwd)"
            for cluster in "${CLUSTERS[@]}"; do
                export TARGET_CLUSTER="$cluster"
                echo "Processing cluster: $TARGET_CLUSTER"
                cd $CONFIG_REPO_NAME
                ./bin/ci-write-manifest
                echo "Finished processing $TARGET_CLUSTER"
                git status
            done

  release-image:
    parameters:
      clusters:
        type: string
      from_tag:
        type: string
      to_tag:
        type: string
    executor:
      name: ci-utils
      image_tag: << pipeline.parameters.CI_UTILS_IMAGE_TAG >>
      registry_host: << pipeline.parameters.REGISTRY_HOST >>
    environment:
      clusters: << parameters.clusters >>
      FROM_TAG: << parameters.from_tag >>
      TO_TAG: << parameters.to_tag >>
      CONFIG_REPO_NAME: << pipeline.parameters.CONFIG_REPO_NAME >>
      CONFIG_REPO_URL: << pipeline.parameters.CONFIG_REPO_URL >>
      CONFIG_REPO: << pipeline.parameters.CONFIG_REPO_URL >>
      REGISTRY_HOST: << pipeline.parameters.REGISTRY_HOST >>
    steps:
      - clone-config-repo
      - run:
          name: Tag & Release Image
          command: |
            export CONFIG_REPO="$CONFIG_REPO_URL"
            export TRIGGERED_BY="$CIRCLE_USERNAME"
            export REGISTRY_REPO="$CIRCLE_PROJECT_REPONAME"
            /usr/local/bin/image-tag
            cd $CONFIG_REPO_NAME
            /usr/local/bin/image-release-pr clusters/prod/manifests/prod.yaml

  test-application:
    executor:
      name: ci-utils
      image_tag: << pipeline.parameters.CI_UTILS_IMAGE_TAG >>
      registry_host: << pipeline.parameters.REGISTRY_HOST >>
    environment:
      REGISTRY_HOST: << pipeline.parameters.REGISTRY_HOST >>
      TEST_IMAGE: myaccount:test
      TEST_NETWORK: myaccount-test
    steps:
      - checkout
      - setup_remote_docker:
          docker_layer_caching: true
      - attach_workspace:
          at: /tmp
      - run:
          name: Load built image
          command: |
            docker load -i /tmp/docker-image.tar
            docker tag "$REGISTRY_HOST/library/$CIRCLE_PROJECT_REPONAME:$TAG" "$TEST_IMAGE"
      - docker/check:
          registry: $REGISTRY_HOST
      - run:
          name: Start Redis
          command: |
            docker network create "$TEST_NETWORK"
            docker run -d --network "$TEST_NETWORK" --name redis redis:7.2.2-alpine
      - run:
          name: Lint
          command: |
            docker run --rm \
              --network "$TEST_NETWORK" \
              -e RAILS_ENV=test \
              -e REDIS_SIDEKIQ_URI=redis://redis:6379/1 \
              -e REDIS_DATABASE_URI=redis://redis:6379/2 \
              "$TEST_IMAGE" \
              sh -lc 'bundle exec niftany && yarn lint'
      - run:
          name: Test
          command: |
            CONTAINER_NAME=myaccount-test-run
            docker create \
              --name "$CONTAINER_NAME" \
              --network "$TEST_NETWORK" \
              -e RAILS_ENV=test \
              -e REDIS_SIDEKIQ_URI=redis://redis:6379/1 \
              -e REDIS_DATABASE_URI=redis://redis:6379/2 \
              "$TEST_IMAGE" \
              sh -lc 'yarn test && bundle exec rspec'
            docker start -a "$CONTAINER_NAME"
            test_status=$?
            docker cp "$CONTAINER_NAME:/app/coverage" ./coverage || true
            docker rm -f "$CONTAINER_NAME"
            exit $test_status
      - store_artifacts:
          path: coverage
workflows:

  delete-deployment:
    when:
      equal: [ "delete", << pipeline.parameters.GHA_Event >> ]
    jobs:
      - delete-deployment:
          name: delete-deployment
          context: [org-global]
          delete_branch: << pipeline.parameters.GHA_Meta >>
          filters:
            branches:
              only: main

  docker-push:
    unless:
      equal: [ "delete", << pipeline.parameters.GHA_Event >> ]
    jobs:
      - build-image:
          name: build-image
          context:
            - org-global
          filters:
            branches:
              only:
                - main
                - /preview\/.*/
      - deploy-application:
          name: deploy-application
          context:
            - org-global
          clusters: << pipeline.parameters.CLUSTERS_DEV >>
          filters:
            branches:
              only:
                - main
                - /preview\/.*/
          requires:
            - push-image
      - push-image:
          name: push-image
          context:
            - org-global
          filters:
            branches:
              only:
                - main
                - /preview\/.*/
          requires:
            - test-application
      - release-image:
          name: release-image
          clusters: << pipeline.parameters.CLUSTERS_PROD >>
          context:
            - org-global
          from_tag: "<< pipeline.git.revision >>"
          to_tag: "<< pipeline.git.tag >>"
          filters:
            branches:
              ignore: /.*/
            tags:
              only: /^v\d+\.\d+\.\d+.*/
      - test-application:
          name: test-application
          context:
            - org-global
          requires:
            - build-image
          filters:
            branches:
              only:
                - main
                - /preview\/.*/